let answers = [];

function startQuiz() {
  current = 0;
  answers = [];
  document.getElementById("view-intro").style.display = "none";
  document.getElementById("progress-area").style.display = "block";
  document.getElementById("view-question").style.display = "block";
  renderQuestion();
}

function renderQuestion() {
  updateProgress();
  const q = questions[current];
  const container = document.getElementById("view-question");
  container.innerHTML = `
    <div class="question-block">
      <div class="q-label">Domanda ${current + 1} di ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map(opt => `
          <button class="option ${answers[current] === opt.value ? 'selected' : ''}"
                  onclick="selectOption('${opt.value}')">
            <span class="option-icon">${opt.icon}</span>
            <span>${opt.label}</span>
          </button>
        `).join('')}
      </div>
      <div class="nav">
        ${current > 0 ? `<button class="btn btn-back" onclick="goBack()">← Indietro</button>` : ''}
        <button class="btn btn-next" id="btn-next" onclick="goNext()" ${answers[current] ? '' : 'disabled'}>
          ${current < questions.length - 1 ? 'Avanti →' : 'Scopri il tuo format ✨'}
        </button>
      </div>
    </div>
  `;
}

function selectOption(value) {
  answers[current] = value;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('btn-next').disabled = false;
}

function goNext() {
  if (!answers[current]) return;
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function updateProgress() {
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('q-counter').textContent = `Domanda ${current + 1} di ${questions.length}`;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showResult() {
  const scored = formats.map(f => ({ ...f, pts: f.score(answers) })).sort((a, b) => b.pts - a.pts);
  const top = scored[0];
  const alts = scored.slice(1, 4);

  document.getElementById('q-pct').textContent = '100%';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('q-counter').textContent = '✓ Analisi completata';
  document.getElementById("view-question").style.display = "none";

  const resultEl = document.getElementById("view-result");
  resultEl.style.display = "block";
  resultEl.innerHTML = `
    <div class="result">
      <div class="result-tag">Il tuo match perfetto</div>
      <h2>Abbiamo trovato<br>il format giusto per te!</h2>
      <p class="result-subtitle">Sulla base delle tue risposte, questo è il format SunnyWay più adatto al tuo team:</p>
      <div class="result-card">
        <span class="result-emoji">${top.emoji}</span>
        <div class="result-name">${top.name}</div>
        <p class="result-desc">${top.desc}</p>
        <div class="result-tags">${top.tags.map(t => `<span class="result-tag-chip">${t}</span>`).join('')}</div>
      </div>
      <div class="alternatives">
        <div class="alt-label">Potrebbero interessarti anche</div>
        <div class="alt-chips">${alts.map(f => `<span class="alt-chip">${f.emoji} ${f.name}</span>`).join('')}</div>
      </div>
      <a href="https://sunnywayteambuilding.com/it/team-building/" target="_blank" class="cta-btn">
        Esplora i format su SunnyWay →
      </a>
      <button class="restart-btn" onclick="restartQuiz()">↩ Ricomincia dal principio</button>
    </div>
  `;
}

function restartQuiz() {
  document.getElementById("view-result").style.display = "none";
  document.getElementById("progress-area").style.display = "none";
  document.getElementById("view-intro").style.display = "block";
}
</script>
</body>
</html>
